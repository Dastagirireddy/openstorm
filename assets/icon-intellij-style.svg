<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Background gradient -->
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f0f23;stop-opacity:1" />
    </linearGradient>

    <!-- Blue accent gradient -->
    <linearGradient id="blueGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3574f0;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#5b9aff;stop-opacity:1" />
    </linearGradient>

    <!-- Subtle glow -->
    <filter id="glow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="512" height="512" rx="100" fill="url(#bgGradient)"/>

  <!-- Subtle inner border -->
  <rect x="8" y="8" width="496" height="496" rx="92" 
        fill="none" stroke="rgba(255,255,255,0.06)" stroke-width="2"/>

  <!-- Glow behind letters -->
  <ellipse cx="256" cy="260" rx="130" ry="80" 
           fill="rgba(53, 116, 240, 0.15)" filter="url(#glow)"/>

  <!-- "O" letter - bold geometric style -->
  <text x="165" y="320" 
        font-family="'Arial', 'Helvetica Neue', sans-serif" 
        font-weight="bold" 
        font-size="280" 
        fill="url(#blueGradient)" 
        text-anchor="middle"
        letter-spacing="-15">O</text>

  <!-- "S" letter - bold geometric style, slightly overlapping -->
  <text x="330" y="320" 
        font-family="'Arial', 'Helvetica Neue', sans-serif" 
        font-weight="bold" 
        font-size="280" 
        fill="url(#blueGradient)" 
        text-anchor="middle"
        letter-spacing="-15">S</text>

  <!-- Small accent dot -->
  <circle cx="410" cy="390" r="8" fill="#3574f0" opacity="0.7"/>
</svg>