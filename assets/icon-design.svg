<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <!-- Gradient for the storm cloud background -->
    <linearGradient id="cloudGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#1a1a2e;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#16213e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0f3460;stop-opacity:1" />
    </linearGradient>

    <!-- Gradient for the lightning bolt -->
    <linearGradient id="lightningGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffd700;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#ffed4e;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#ffb700;stop-opacity:1" />
    </linearGradient>

    <!-- Glow effect for lightning -->
    <filter id="lightningGlow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="8" result="blur"/>
      <feFlood flood-color="#ffd700" flood-opacity="0.8" result="glowColor"/>
      <feComposite in="glowColor" in2="blur" operator="in" result="softGlow"/>
      <feMerge>
        <feMergeNode in="softGlow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <!-- Code bracket accent gradient -->
    <linearGradient id="bracketGradient" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#00d9ff;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0099cc;stop-opacity:1" />
    </linearGradient>
  </defs>

  <!-- Background rounded square (app icon shape) -->
  <rect x="20" y="20" width="472" height="472" rx="100" fill="url(#cloudGradient)"/>

  <!-- Subtle border highlight -->
  <rect x="20" y="20" width="472" height="472" rx="100"
        fill="none" stroke="rgba(255,255,255,0.1)" stroke-width="4"/>

  <!-- Lightning bolt - main symbol -->
  <g filter="url(#lightningGlow)">
    <path d="M 280 80 L 180 280 L 260 280 L 220 420 L 360 200 L 270 200 Z"
          fill="url(#lightningGradient)"
          stroke="#ff8c00" stroke-width="3" stroke-linejoin="round"/>
  </g>

  <!-- Code brackets on sides - representing the IDE/editor aspect -->
  <path d="M 120 180 Q 100 256 120 332"
        fill="none"
        stroke="url(#bracketGradient)"
        stroke-width="12"
        stroke-linecap="round"/>

  <path d="M 392 180 Q 412 256 392 332"
        fill="none"
        stroke="url(#bracketGradient)"
        stroke-width="12"
        stroke-linecap="round"/>

  <!-- Small accent dots representing syntax/structure -->
  <circle cx="180" cy="140" r="8" fill="#00d9ff" opacity="0.8"/>
  <circle cx="340" cy="380" r="6" fill="#00d9ff" opacity="0.6"/>
  <circle cx="160" cy="360" r="5" fill="#ff6b6b" opacity="0.7"/>

  <!-- Subtle grid pattern overlay for tech feel -->
  <g opacity="0.05">
    <path d="M 50 50 L 462 50 M 50 100 L 462 100 M 50 150 L 462 150 M 50 200 L 462 200
             M 50 250 L 462 250 M 50 300 L 462 300 M 50 350 L 462 350 M 50 400 L 462 400 M 50 450 L 462 450"
          stroke="#ffffff" stroke-width="1"/>
  </g>
</svg>
