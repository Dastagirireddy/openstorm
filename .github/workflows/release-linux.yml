name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
            src-tauri/target/**/release/bundle/**/latest.json
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        run: |
          set -e
          VERSION="${GITHUB_REF#refs/tags/}"

          ASSETS=()
          while IFS= read -r -d '' f; do
            ASSETS+=("$f")
          done < <(find artifacts -type f \
            -not -name "*.app" \
            -not -name "*.app.tar.gz" \
            -not -name "*.app.tar.gz.sig" \
            -print0)

          echo "Release assets (${#ASSETS[@]}):"
          printf '%s\n' "${ASSETS[@]}"

          if [ ${#ASSETS[@]} -eq 0 ]; then
            echo "::error::No release assets found"
            exit 1
          fi

          echo "Creating release ${VERSION}..."
          gh auth status
          gh release create "${VERSION}" \
            --title "OpenStorm ${VERSION}" \
            --notes "Download the installer for your platform below. Auto-updates: This app checks for updates on startup." \
            --draft \
            "${ASSETS[@]}"
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
