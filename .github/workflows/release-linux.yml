name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            arch: 'x64'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            arch: 'arm64'
            args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: List all bundle files
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/release/bundle -type f | sort
          echo ""
          echo "=== .sig files ==="
          find src-tauri/target -name "*.sig" 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Generate unified updater manifest
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="Dastagirireddy/openstorm"
          PLATFORM_ENTRIES=""

          for APPIMAGE in $(find artifacts -name "*.AppImage" -type f | sort); do
            APPIMAGE_NAME=$(basename "$APPIMAGE")
            SIG_FILE="${APPIMAGE}.sig"

            if echo "$APPIMAGE_NAME" | grep -q "aarch64"; then
              PLATFORM_KEY="linux-aarch64"
            elif echo "$APPIMAGE_NAME" | grep -q "amd64"; then
              PLATFORM_KEY="linux-x86_64"
            else
              echo "WARNING: Unknown arch for $APPIMAGE_NAME, skipping"
              continue
            fi

            if [ ! -f "$SIG_FILE" ]; then
              echo "WARNING: No .sig file for $APPIMAGE_NAME, skipping"
              continue
            fi

            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${APPIMAGE_NAME}"
            SIG_CONTENT=$(cat "$SIG_FILE" | tr -d '\n')

            echo "Platform: $PLATFORM_KEY -> $APPIMAGE_NAME"

            ENTRY=$(printf '"%s": {"signature": "%s", "url": "%s"}' \
              "$PLATFORM_KEY" "$SIG_CONTENT" "$DOWNLOAD_URL")

            if [ -n "$PLATFORM_ENTRIES" ]; then
              PLATFORM_ENTRIES="${PLATFORM_ENTRIES}, "
            fi
            PLATFORM_ENTRIES="${PLATFORM_ENTRIES}${ENTRY}"
          done

          if [ -z "$PLATFORM_ENTRIES" ]; then
            echo "ERROR: No platforms found"
            exit 1
          fi

          printf '{\n  "version": "v%s",\n  "notes": "Update to v%s",\n  "pub_date": "%s",\n  "platforms": {%s}\n}\n' \
            "$VERSION" "$VERSION" "$DATE" "$PLATFORM_ENTRIES" > artifacts/latest.json

          echo "=== latest.json ==="
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenStorm ${{ github.ref_name }}
          body: |
            Download the installer for your platform below.
            - **x64**: For Intel/AMD processors
            - **arm64**: For ARM processors (Apple Silicon, Raspberry Pi, etc.)
            Auto-updates enabled — the app checks for new versions on startup.
          draft: false
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.sig
            artifacts/latest.json
