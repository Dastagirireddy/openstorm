name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            arch: 'x64'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            arch: 'arm64'
            args: ''

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install minisign
        run: |
          sudo apt-get update && sudo apt-get install -y minisign || true
          if ! command -v minisign &> /dev/null; then
            curl -sL https://github.com/jedisct1/minisign/releases/latest/download/minisign--linux-x86_64.tar.gz | sudo tar xz -C /usr/local/bin --strip-components=1
          fi
          minisign -v

      - name: Sign AppImage and generate updater manifest
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
        run: |
          set -e
          echo "=== Searching for AppImage ==="
          APPIMAGE=$(find src-tauri/target -name "*.AppImage" -type f | head -1)
          echo "AppImage: $APPIMAGE"

          if [ -z "$APPIMAGE" ]; then
            echo "No AppImage found - skipping"
            exit 0
          fi

          echo "=== Writing private key ==="
          KEYFILE=$(mktemp)
          echo "$TAURI_SIGNING_PRIVATE_KEY" > "$KEYFILE"

          echo "=== Signing AppImage with minisign ==="
          minisign -Sm "$APPIMAGE" -s "$KEYFILE" -x "${APPIMAGE}.sig"
          rm -f "$KEYFILE"

          echo "=== Signature file ==="
          ls -la "${APPIMAGE}.sig"

          echo "=== Generating latest.json ==="
          VERSION=$(grep '"version"' src-tauri/tauri.conf.json | head -1 | sed 's/.*"\([0-9.]*\)".*/\1/')
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          APPIMAGE_NAME=$(basename "$APPIMAGE")
          DOWNLOAD_URL="https://github.com/Dastagirireddy/openstorm/releases/download/v${VERSION}/${APPIMAGE_NAME}"
          SIG_CONTENT=$(cat "${APPIMAGE}.sig")
          BUNDLE_DIR=$(dirname "$APPIMAGE")

          printf '{\n  "version": "v%s",\n  "notes": "Update to v%s",\n  "pub_date": "%s",\n  "platforms": {\n    "linux-x86_64": {\n      "signature": "%s",\n      "url": "%s"\n    }\n  }\n}\n' \
            "$VERSION" "$VERSION" "$DATE" "$SIG_CONTENT" "$DOWNLOAD_URL" \
            > "${BUNDLE_DIR}/latest.json"

          echo "=== latest.json created ==="
          cat "${BUNDLE_DIR}/latest.json"

      - name: List all bundle files
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/release/bundle -type f | sort
          echo ""
          echo "=== .sig files ==="
          find src-tauri/target -name "*.sig" 2>/dev/null
          echo ""
          echo "=== latest.json ==="
          find src-tauri/target -name "latest.json" 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
            src-tauri/target/**/release/bundle/**/latest.json
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenStorm ${{ github.ref_name }}
          body: |
            Download the installer for your platform below.
            - **x64**: For Intel/AMD processors
            - **arm64**: For ARM processors (Apple Silicon, Raspberry Pi, etc.)
            Auto-updates enabled — the app checks for new versions on startup.
          draft: true
          files: |
            artifacts/**/*.deb
            artifacts/**/*.AppImage
            artifacts/**/*.rpm
            artifacts/**/*.sig
            artifacts/**/latest.json
