name: Release Linux

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-22.04
    outputs:
      tag: ${{ steps.meta.outputs.tag }}

    steps:
      - uses: actions/checkout@v4

      - name: Get tag name
        id: meta
        run: echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Install Linux system dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build Tauri app
        run: pnpm tauri build
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: linux-x64
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.deb
            src-tauri/target/**/release/bundle/**/*.rpm
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
            src-tauri/target/**/release/bundle/**/latest.json
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Create GitHub Release
        run: |
          TAG="${{ needs.build.outputs.tag }}"
          echo "Creating release for tag: ${TAG}"

          # Create release via API
          RESPONSE=$(curl -s -X POST \
            -H "Authorization: token $GITHUB_TOKEN" \
            -H "Accept: application/vnd.github+json" \
            "https://api.github.com/repos/${{ github.repository }}/releases" \
            -d "{
              \"tag_name\": \"${TAG}\",
              \"name\": \"OpenStorm ${TAG}\",
              \"body\": \"Download the installer for your platform below. Auto-updates enabled.\",
              \"draft\": true
            }")

          echo "Create response: $RESPONSE"
          RELEASE_ID=$(echo "$RESPONSE" | python3 -c "import sys,json; print(json.load(sys.stdin).get('id',''))")
          echo "Release ID: $RELEASE_ID"

          if [ -z "$RELEASE_ID" ]; then
            echo "::error::Failed to create release"
            exit 1
          fi

          # Upload each asset
          for FILE in $(find artifacts -type f \
            -not -name "*.app" \
            -not -name "*.app.tar.gz" \
            -not -name "*.app.tar.gz.sig"); do
            FILENAME=$(basename "$FILE")
            echo "Uploading: $FILENAME"
            UPLOAD=$(curl -s -X POST \
              -H "Authorization: token $GITHUB_TOKEN" \
              -H "Accept: application/vnd.github+json" \
              "https://uploads.github.com/repos/${{ github.repository }}/releases/${RELEASE_ID}/assets?name=${FILENAME}" \
              --data-binary "@${FILE}")
            echo "Upload response: $(echo "$UPLOAD" | python3 -c "import sys,json; d=json.load(sys.stdin); print(f'{d.get(\"name\",\"?\")} size={d.get(\"size\",\"?\")}')")"
          done

          echo "Release created: https://github.com/${{ github.repository }}/releases/tag/${TAG}"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
