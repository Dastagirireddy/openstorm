name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'ubuntu-22.04'
            os: 'linux'
            arch: 'x64'
            args: ''
          - platform: 'ubuntu-22.04-arm'
            os: 'linux'
            arch: 'arm64'
            args: ''
          - platform: 'macos-14'
            os: 'macos'
            arch: 'aarch64'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-13'
            os: 'macos'
            arch: 'x86_64'
            args: '--target x86_64-apple-darwin'

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            libayatana-appindicator3-dev \
            librsvg2-dev \
            patchelf \
            libssl-dev \
            libdbus-1-dev

      - name: Install pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'pnpm'

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.os == 'macos' && (matrix.arch == 'aarch64' && 'aarch64-apple-darwin' || 'x86_64-apple-darwin') || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: './src-tauri -> target'

      - name: Install frontend dependencies
        run: pnpm install

      - name: Build frontend
        run: pnpm build

      - name: Install Tauri CLI
        run: cargo install tauri-cli --version "^2"

      - name: Build Tauri app
        run: cargo tauri build -- ${{ matrix.args }}
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}

      - name: Install minisign (Linux)
        if: runner.os == 'Linux'
        run: sudo apt-get install -y minisign

      - name: Install minisign (macOS)
        if: runner.os == 'macOS'
        run: brew install minisign

      - name: Sign updater files
        run: |
          # Decode the minisign private key
          echo "$TAURI_SIGNING_PRIVATE_KEY" | base64 -d > /tmp/signing.key

          if [ "${{ runner.os }}" = "Linux" ]; then
            echo "=== Signing AppImage files ==="
            for FILE in $(find src-tauri/target -name "*.AppImage" -type f); do
              FILE_NAME=$(basename "$FILE")
              echo "Signing: $FILE_NAME"
              minisign -S -s /tmp/signing.key -x "${FILE}.sig" -m "$FILE" -q
              if [ -f "${FILE}.sig" ]; then
                echo "  Created: ${FILE_NAME}.sig"
              else
                echo "  ERROR: Failed to sign $FILE_NAME"
              fi
            done
          elif [ "${{ runner.os }}" = "macOS" ]; then
            echo "=== Signing DMG files ==="
            for FILE in $(find src-tauri/target -name "*.dmg" -type f); do
              FILE_NAME=$(basename "$FILE")
              echo "Signing: $FILE_NAME"
              minisign -S -s /tmp/signing.key -x "${FILE}.sig" -m "$FILE" -q
              if [ -f "${FILE}.sig" ]; then
                echo "  Created: ${FILE_NAME}.sig"
              else
                echo "  ERROR: Failed to sign $FILE_NAME"
              fi
            done
          fi

          rm -f /tmp/signing.key

          echo "=== All .sig files ==="
          find src-tauri/target -name "*.sig" -type f
        env:
          TAURI_SIGNING_PRIVATE_KEY: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY }}
          TAURI_SIGNING_PRIVATE_KEY_PASSWORD: ${{ secrets.TAURI_SIGNING_PRIVATE_KEY_PASSWORD }}

      - name: List all bundle files
        run: |
          echo "=== Bundle files ==="
          find src-tauri/target/release/bundle -type f | sort
          echo ""
          echo "=== .sig files ==="
          find src-tauri/target -name "*.sig" 2>/dev/null

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.os }}-${{ matrix.arch }}
          path: |
            src-tauri/target/**/release/bundle/**/*.AppImage
            src-tauri/target/**/release/bundle/**/*.dmg
            src-tauri/target/**/release/bundle/**/*.AppImage.sig
            src-tauri/target/**/release/bundle/**/*.dmg.sig
          if-no-files-found: warn

  release:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true

      - name: List downloaded files
        run: find artifacts -type f | sort

      - name: Generate unified updater manifest
        run: |
          set -e

          VERSION="${GITHUB_REF_NAME#v}"
          DATE=$(date -u +"%Y-%m-%dT%H:%M:%SZ")
          REPO="Dastagirireddy/openstorm"
          PLATFORM_ENTRIES=""

          # Process Linux AppImage files
          for APPIMAGE in $(find artifacts -name "*.AppImage" -type f | sort); do
            AI_NAME=$(basename "$APPIMAGE")
            SIG_FILE="${APPIMAGE}.sig"

            if echo "$AI_NAME" | grep -q "aarch64"; then
              PLATFORM_KEY="linux-aarch64"
            elif echo "$AI_NAME" | grep -q "x86_64"; then
              PLATFORM_KEY="linux-x86_64"
            else
              echo "WARNING: Unknown arch for $AI_NAME, skipping"
              continue
            fi

            if [ ! -f "$SIG_FILE" ]; then
              echo "WARNING: No .sig file for $AI_NAME, skipping"
              continue
            fi

            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${AI_NAME}"
            SIG_CONTENT=$(cat "$SIG_FILE" | tr -d '\n')

            echo "Platform: $PLATFORM_KEY -> $AI_NAME"

            ENTRY=$(printf '"%s": {"signature": "%s", "url": "%s"}' \
              "$PLATFORM_KEY" "$SIG_CONTENT" "$DOWNLOAD_URL")

            if [ -n "$PLATFORM_ENTRIES" ]; then
              PLATFORM_ENTRIES="${PLATFORM_ENTRIES}, "
            fi
            PLATFORM_ENTRIES="${PLATFORM_ENTRIES}${ENTRY}"
          done

          # Process macOS DMG files
          for DMG in $(find artifacts -name "*.dmg" -type f | sort); do
            DMG_NAME=$(basename "$DMG")
            SIG_FILE="${DMG}.sig"

            if echo "$DMG_NAME" | grep -q "aarch64"; then
              PLATFORM_KEY="darwin-aarch64"
            elif echo "$DMG_NAME" | grep -q "x86_64"; then
              PLATFORM_KEY="darwin-x86_64"
            else
              echo "WARNING: Unknown arch for $DMG_NAME, skipping"
              continue
            fi

            if [ ! -f "$SIG_FILE" ]; then
              echo "WARNING: No .sig file for $DMG_NAME, skipping"
              continue
            fi

            DOWNLOAD_URL="https://github.com/${REPO}/releases/download/v${VERSION}/${DMG_NAME}"
            SIG_CONTENT=$(cat "$SIG_FILE" | tr -d '\n')

            echo "Platform: $PLATFORM_KEY -> $DMG_NAME"

            ENTRY=$(printf '"%s": {"signature": "%s", "url": "%s"}' \
              "$PLATFORM_KEY" "$SIG_CONTENT" "$DOWNLOAD_URL")

            if [ -n "$PLATFORM_ENTRIES" ]; then
              PLATFORM_ENTRIES="${PLATFORM_ENTRIES}, "
            fi
            PLATFORM_ENTRIES="${PLATFORM_ENTRIES}${ENTRY}"
          done

          if [ -z "$PLATFORM_ENTRIES" ]; then
            echo "ERROR: No platforms found"
            exit 1
          fi

          printf '{\n  "version": "v%s",\n  "notes": "Update to v%s",\n  "pub_date": "%s",\n  "platforms": {%s}\n}\n' \
            "$VERSION" "$VERSION" "$DATE" "$PLATFORM_ENTRIES" > artifacts/latest.json

          echo "=== latest.json ==="
          cat artifacts/latest.json

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: OpenStorm ${{ github.ref_name }}
          body: |
            Download the installer for your platform below.
            - **Linux x64**: For Intel/AMD processors
            - **Linux arm64**: For ARM processors (Raspberry Pi, etc.)
            - **macOS Apple Silicon**: For M1/M2/M3/M4 processors
            - **macOS Intel**: For Intel-based Macs
            Auto-updates enabled — the app checks for new versions on startup.
          draft: false
          files: |
            artifacts/**/*.AppImage
            artifacts/**/*.AppImage.sig
            artifacts/**/*.dmg
            artifacts/**/*.dmg.sig
            artifacts/latest.json
